name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Build fat JAR (platform-independent)
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'
      - name: Install Tree-sitter native libraries
        run: |
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter.git /tmp/tree-sitter
          cd /tmp/tree-sitter && make -j$(nproc)
          sudo make install PREFIX=/usr/local
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-java.git /tmp/tree-sitter-java
          cd /tmp/tree-sitter-java
          cc -shared -fPIC -Isrc src/parser.c -o libtree-sitter-java.so
          sudo cp libtree-sitter-java.so /usr/local/lib/
          sudo ldconfig
      - name: Build fat JAR
        run: mvn package -DskipTests -Djava.library.path=/usr/local/lib
        env:
          MAVEN_OPTS: "--enable-native-access=ALL-UNNAMED"
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsrc-jar
          path: target/jsrc.jar

  # Build native binary for Linux x64
  native-linux-x64:
    runs-on: ubuntu-latest
    needs: build-jar
    steps:
      - uses: actions/checkout@v4
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: jsrc-jar
          path: target/
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
      - name: Install Tree-sitter native libraries
        run: |
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter.git /tmp/tree-sitter
          cd /tmp/tree-sitter && make -j$(nproc)
          sudo make install PREFIX=/usr/local
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-java.git /tmp/tree-sitter-java
          cd /tmp/tree-sitter-java
          cc -shared -fPIC -Isrc src/parser.c -o libtree-sitter-java.so
          sudo cp libtree-sitter-java.so /usr/local/lib/
          sudo ldconfig
      - name: Build native image
        run: |
          native-image --enable-native-access=ALL-UNNAMED \
            -Djava.library.path=/usr/local/lib \
            -jar target/jsrc.jar \
            -o jsrc-linux-x64 \
            -H:+SharedArenaSupport \
            --no-fallback
      - name: Smoke test
        run: |
          ./jsrc-linux-x64 --help > /dev/null
          ./jsrc-linux-x64 --describe --json > /dev/null
          echo "✓ Native binary works"
      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsrc-linux-x64
          path: jsrc-linux-x64

  # Build native binary for macOS arm64
  native-macos-arm64:
    runs-on: macos-14
    needs: build-jar
    steps:
      - uses: actions/checkout@v4
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: jsrc-jar
          path: target/
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
      - name: Install Tree-sitter native libraries
        run: |
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter.git /tmp/tree-sitter
          cd /tmp/tree-sitter && make -j$(sysctl -n hw.ncpu)
          sudo make install PREFIX=/usr/local
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-java.git /tmp/tree-sitter-java
          cd /tmp/tree-sitter-java
          cc -dynamiclib -fPIC -Isrc src/parser.c \
            -L/usr/local/lib -ltree-sitter \
            -install_name @rpath/libtree-sitter-java.dylib \
            -o libtree-sitter-java.dylib
          sudo cp libtree-sitter-java.dylib /usr/local/lib/
      - name: Build native image
        run: |
          native-image --enable-native-access=ALL-UNNAMED \
            -Djava.library.path=/usr/local/lib \
            -jar target/jsrc.jar \
            -o jsrc-macos-arm64 \
            -H:+SharedArenaSupport \
            --no-fallback
      - name: Smoke test
        run: |
          ./jsrc-macos-arm64 --help > /dev/null
          ./jsrc-macos-arm64 --describe --json > /dev/null
          echo "✓ Native binary works"
      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsrc-macos-arm64
          path: jsrc-macos-arm64

  # Build native binary for macOS x64
  native-macos-x64:
    runs-on: macos-13
    needs: build-jar
    steps:
      - uses: actions/checkout@v4
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: jsrc-jar
          path: target/
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
      - name: Install Tree-sitter native libraries
        run: |
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter.git /tmp/tree-sitter
          cd /tmp/tree-sitter && make -j$(sysctl -n hw.ncpu)
          sudo make install PREFIX=/usr/local
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter-java.git /tmp/tree-sitter-java
          cd /tmp/tree-sitter-java
          cc -dynamiclib -fPIC -Isrc src/parser.c \
            -L/usr/local/lib -ltree-sitter \
            -install_name @rpath/libtree-sitter-java.dylib \
            -o libtree-sitter-java.dylib
          sudo cp libtree-sitter-java.dylib /usr/local/lib/
      - name: Build native image
        run: |
          native-image --enable-native-access=ALL-UNNAMED \
            -Djava.library.path=/usr/local/lib \
            -jar target/jsrc.jar \
            -o jsrc-macos-x64 \
            -H:+SharedArenaSupport \
            --no-fallback
      - name: Smoke test
        run: |
          ./jsrc-macos-x64 --help > /dev/null
          ./jsrc-macos-x64 --describe --json > /dev/null
          echo "✓ Native binary works"
      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsrc-macos-x64
          path: jsrc-macos-x64

  # Create GitHub Release with all artifacts
  release:
    runs-on: ubuntu-latest
    needs: [build-jar, native-linux-x64, native-macos-arm64, native-macos-x64]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/jsrc-jar/jsrc.jar release/
          cp artifacts/jsrc-linux-x64/jsrc-linux-x64 release/
          cp artifacts/jsrc-macos-arm64/jsrc-macos-arm64 release/
          cp artifacts/jsrc-macos-x64/jsrc-macos-x64 release/
          chmod +x release/jsrc-*
          cd release && sha256sum * > checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/jsrc.jar
            release/jsrc-linux-x64
            release/jsrc-macos-arm64
            release/jsrc-macos-x64
            release/checksums.txt
          generate_release_notes: true
