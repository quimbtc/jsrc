# Configuración de SLF4J Simple Logger
# Nivel de logging por defecto: DEBUG muestra todos los logs (DEBUG, INFO, WARN, ERROR)
org.slf4j.simpleLogger.defaultLogLevel=debug

# Mostrar el nombre del logger (false = solo muestra mensaje)
org.slf4j.simpleLogger.showLoggerName=false

# Mostrar el nombre corto del logger (solo el nombre de la clase)
org.slf4j.simpleLogger.showShortLoggerName=false

# Mostrar el nombre del thread
org.slf4j.simpleLogger.showThreadName=false

# Mostrar fecha y hora
org.slf4j.simpleLogger.showDateTime=true

# Formato de fecha y hora
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss

# Nivel de logging para clases específicas
org.slf4j.simpleLogger.log.com.jsrc.app=debug

